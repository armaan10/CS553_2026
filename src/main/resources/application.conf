akka {
  loglevel = "DEBUG"
  actor.provider = "local"
  # Exit JVM cleanly when ActorSystem terminates
  coordinated-shutdown.exit-jvm = off
}

sim {
  # All message types in the simulation.
  # CONTROL is reserved for algorithm messages and is always permitted on every edge.
  messages {
    types = ["CONTROL", "PING", "GOSSIP", "WORK", "ACK"]
  }

  # Edge labeling: which message types are allowed to traverse a channel.
  # CONTROL is appended automatically in GraphLoader.enrich().
  # Priority: perEdge (config) > allowedTypes (graph JSON) > default.
  edgeLabeling {
    default = ["PING", "GOSSIP"]

    # Per-edge overrides — uncomment and adjust to match your graph's node IDs.
    # Example below models two dedicated channels:
    #   1→3 : heartbeat only (PING)
    #   3→5 : task channel  (GOSSIP + WORK)
    perEdge = [
      # { fromId = 1, toId = 3, allowedTypes = ["PING"] }
      # { fromId = 3, toId = 5, allowedTypes = ["GOSSIP", "WORK"] }
    ]
  }

  # Background traffic generation
  traffic {
    # How often each timer node fires (milliseconds)
    tickIntervalMs = 300

    # Probability mass function over message types for all nodes (must sum to 1.0)
    defaultPdf = [
      { msg = "PING",   p = 0.50 }
      { msg = "GOSSIP", p = 0.30 }
      { msg = "WORK",   p = 0.20 }
    ]

    # Per-node PDF overrides (optional)
    perNodePdf = []
  }

  # Algorithm-specific settings
  algorithms {
    # Number of probe rounds for Itai-Rodeh ring-size estimation.
    # More rounds → better accuracy via averaging; fewer → faster convergence.
    # Override via --rounds CLI flag or per-experiment config.
    ringSizeMaxRounds = 3
  }

  # Computation initiation mechanisms.
  # timers: node IDs that emit messages on a periodic timer (models background producers).
  # inputs: node IDs that accept ExternalInput injection from the driver.
  initiators {
    timers = [1, 3, 5]
    inputs = [2, 4]
  }
}

cinnamon {
  application = "cs553-distributed-sim"

  chmetrics {
    reporters += "console-reporter"
  }

  akka.actors {
    "/user/*" {
      report-by = instance
    }
  }

  jvm-metrics {
    producers += "jvm-metrics-producer"
  }
}
