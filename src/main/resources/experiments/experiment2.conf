# Experiment 2: Medium graph (12 nodes, ring + cross-edges) + Itai-Rodeh Ring Size
#
# Why this configuration matters for ring-size estimation:
#   Cross-edges add background PING/GOSSIP traffic that runs concurrently with the
#   PROBE messages of the ring-size algorithm. The algorithm uses CONTROL-typed
#   AlgoMessages which are always permitted on every edge, so cross-traffic does NOT
#   interfere with probe routing. This demonstrates algorithm-layer isolation from
#   application-layer traffic — a key design property.
#
#   With 12 nodes the estimated ring size should converge to 12 over 3 rounds.
#   Comparing across multiple node logs verifies consistent estimates.
#
# Run with:
#   sbt "runMain edu.uic.cs553.cli.SimMain --config experiments/experiment2 --algo ring-size --duration 30"

include "application"

sim {
  traffic {
    tickIntervalMs = 200

    defaultPdf = [
      { msg = "PING",   p = 0.40 }
      { msg = "GOSSIP", p = 0.40 }
      { msg = "WORK",   p = 0.20 }
    ]
  }

  initiators {
    timers = [1, 4, 7, 10]
    inputs = [2, 6]
  }
}

