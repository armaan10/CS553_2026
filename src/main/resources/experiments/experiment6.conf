# Experiment 6: NetGameSim graph (NetGraph_18-04-26-05-03-31.ngs) with per-edge labels
#
# Graph topology (fromNode.id -> toNode.id):
#   0->1, 0->2, 1->9, 2->4, 3->8, 5->3, 6->5, 7->10, 9->7, 10->6
#
# Nodes 4 and 8 have no outgoing edges; they are ring members but not timer nodes.
#
# Edge labeling models dedicated channel types:
#   heartbeat links  -> PING only           (0->1, 1->9)
#   gossip links     -> PING + GOSSIP       (2->4, 10->6)
#   task links       -> GOSSIP + WORK       (0->2, 3->8)
#   gossip-only      -> GOSSIP              (5->3)
#   dedicated task   -> WORK               (6->5)
#   mixed            -> PING + WORK         (9->7)
#   full traffic     -> PING + GOSSIP + WORK (7->10)
#
# Per-node PDFs are tuned to match each timer node's outgoing edge labels
# so no traffic is silently dropped by the edge-label enforcer.
#
# Run with:
#   sbt "runMain edu.uic.cs553.cli.SimMain \
#        --ngs outputs/NetGraph_18-04-26-05-03-31.ngs \
#        --config experiments/experiment6 \
#        --algo election --duration 25"

include classpath("application")

sim {

  traffic {
    tickIntervalMs = 350

    defaultPdf = [
      { msg = "PING",   p = 0.50 }
      { msg = "GOSSIP", p = 0.30 }
      { msg = "WORK",   p = 0.20 }
    ]

    # Tune each timer node's PDF to only emit types its outgoing edges allow,
    # so the edge-label enforcer never silently drops a message.
    #   Node 1 -> 1->9  allows PING only
    #   Node 5 -> 5->3  allows GOSSIP only
    #   Node 9 -> 9->7  allows PING + WORK
    perNodePdf = [
      {
        node = 1
        pdf  = [{ msg = "PING", p = 1.00 }]
      }
      {
        node = 5
        pdf  = [{ msg = "GOSSIP", p = 1.00 }]
      }
      {
        node = 9
        pdf  = [
          { msg = "PING", p = 0.50 }
          { msg = "WORK", p = 0.50 }
        ]
      }
    ]
  }

  edgeLabeling {
    default = ["PING", "GOSSIP"]

    perEdge = [
      { fromId = 0,  toId = 1,  allowedTypes = ["PING"] }
      { fromId = 0,  toId = 2,  allowedTypes = ["GOSSIP", "WORK"] }
      { fromId = 1,  toId = 9,  allowedTypes = ["PING"] }
      { fromId = 2,  toId = 4,  allowedTypes = ["PING", "GOSSIP"] }
      { fromId = 3,  toId = 8,  allowedTypes = ["GOSSIP", "WORK"] }
      { fromId = 5,  toId = 3,  allowedTypes = ["GOSSIP"] }
      { fromId = 6,  toId = 5,  allowedTypes = ["WORK"] }
      { fromId = 7,  toId = 10, allowedTypes = ["PING", "GOSSIP", "WORK"] }
      { fromId = 9,  toId = 7,  allowedTypes = ["PING", "WORK"] }
      { fromId = 10, toId = 6,  allowedTypes = ["PING", "GOSSIP"] }
    ]
  }

  initiators {
    # Nodes 4 and 8 have no outgoing edges — excluded from timers
    timers = [0, 1, 5, 9]
    inputs = [2, 7]
  }
}
