# Experiment 3: Dense graph (8 nodes, high connectivity) + pure traffic (no algorithm)
#
# Why this configuration matters:
#   With many edges per node, almost every message type finds an eligible channel,
#   so the system approaches maximum throughput. Running without an algorithm lets
#   us measure raw background-traffic capacity: message counts per type, per-channel
#   in-flight load, and the effect of edge-label enforcement.
#
#   Comparing the in-flight distribution between this experiment (dense) and
#   experiment 1 (sparse) quantifies how topology affects message propagation:
#   dense graphs balance load across more channels while sparse rings concentrate
#   traffic on a few edges.
#
#   The faster tick rate (100ms) and higher WORK proportion stress the system,
#   revealing how the PDF shapes the traffic mix under load.
#
# Run with:
#   sbt "runMain edu.uic.cs553.cli.SimMain --config experiments/experiment3 --algo none --duration 20"
#   or with external injection:
#   sbt "runMain edu.uic.cs553.cli.SimMain --config experiments/experiment3 --inject WORK --duration 20"

include classpath("application")

sim {
  messages {
    types = ["CONTROL", "PING", "GOSSIP", "WORK", "ACK"]
  }

  edgeLabeling {
    default = ["PING", "GOSSIP", "WORK", "ACK"]
  }

  traffic {
    tickIntervalMs = 100

    defaultPdf = [
      { msg = "WORK",   p = 0.45 }
      { msg = "PING",   p = 0.25 }
      { msg = "GOSSIP", p = 0.20 }
      { msg = "ACK",    p = 0.10 }
    ]

    # Node 3 is a heavy WORK producer
    perNodePdf = [
      { node = 3, pdf = [{ msg = "WORK", p = 0.90 }, { msg = "PING", p = 0.10 }] }
    ]
  }

  initiators {
    timers = [1, 2, 3, 4, 5, 6]
    inputs = [7, 8]
  }
}

