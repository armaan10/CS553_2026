# Experiment 1: Sparse ring (8 nodes, ring-only topology) + Itai-Rodeh Election
#
# Why this configuration matters for the election algorithm:
#   A pure ring is the theoretical setting for Itai-Rodeh election. With no cross-edges,
#   every ELECT message must travel exactly N hops to determine the winner. This gives
#   the clearest demonstration of the algorithm's correctness: exactly one node should
#   declare itself leader. The sparse topology also means low background traffic,
#   making it easy to isolate algorithm messages in the logs.
#
# Run with:
#   sbt "runMain edu.uic.cs553.cli.SimMain --config experiments/experiment1 --algo election --duration 25"

include classpath("application")

sim {
  traffic {
    tickIntervalMs = 500

    defaultPdf = [
      { msg = "CONTROL", p = 0.60 }
      { msg = "PING",    p = 0.30 }
      { msg = "WORK",    p = 0.10 }
    ]
  }

  initiators {
    timers = [1, 5]
    inputs = [3]
  }
}

